openapi: 3.0.3
info:
  title: RemyInk API
  version: 1.0.0
  description: API documentation for the RemyInk freelance platform
paths:
  /api/chat/guest-thread/create/:
    post:
      operationId: api_chat_guest_thread_create_create
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/chat/guest-threads/:
    get:
      operationId: api_chat_guest_threads_retrieve
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/chat/my-messages/:
    get:
      operationId: api_chat_my_messages_list
      description: Returns all chat threads where the user is a participant (freelancer
        or client)
      summary: List all chat threads for current user
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatThreadList'
          description: ''
  /api/chat/my-messages/{id}/:
    get:
      operationId: api_chat_my_messages_retrieve
      description: Retrieve a specific thread with all messages. Marks messages as
        read.
      summary: Get thread details with messages
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatThreadDetail'
          description: ''
  /api/chat/my-messages/{id}/mark-read/:
    post:
      operationId: api_chat_my_messages_mark_read_create
      description: Mark all messages in a thread as read by the current user
      summary: Mark thread messages as read
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this chat thread.
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: ''
  /api/chat/my-messages/{id}/messages/{message_id}/respond/:
    post:
      operationId: api_chat_my_messages_messages_respond_create
      description: Accept or reject a pending offer. Accepting creates a Job.
      summary: Respond to an offer (accept/reject)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: message_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum:
                  - accept
                  - reject
                  description: Action to take on the offer
              required:
              - action
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'
          description: ''
        '400':
          description: Invalid action or offer state
        '403':
          description: Not authorized to respond to this offer
        '404':
          description: Message or offer not found
  /api/chat/my-messages/{id}/send-message/:
    post:
      operationId: api_chat_my_messages_send_message_create
      description: Send a new message or offer in an existing thread
      summary: Send a message in a thread
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this chat thread.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChatMessageRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatMessageRequest'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'
          description: ''
  /api/chat/my-messages/create-thread/:
    post:
      operationId: api_chat_my_messages_create_thread_create
      description: Create a new chat thread or retrieve existing one with specified
        user
      summary: Create or get thread with another user
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                other_user_username:
                  type: string
                  description: Username of user to chat with
              required:
              - other_user_username
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatThreadDetail'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatThreadDetail'
          description: ''
  /api/chat/my-messages/pending-offers/:
    get:
      operationId: api_chat_my_messages_pending_offers_retrieve
      description: Get all pending offers where user needs to respond
      summary: Get pending offers
      tags:
