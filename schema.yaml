components:
  schemas:
    AccountSettings:
      type: object
      properties:
        email:
          type: string
          format: email
          readOnly: true
        phone:
          type: string
          nullable: true
          pattern: ^\+?1?\d{9,15}$
          maxLength: 20
      required:
      - email
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Unique name of the category (e.g., Computing and IT).
          maxLength: 100
        slug:
          type: string
          readOnly: true
          description: Auto-generated slug from name, used for URLs and lookups.
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
          description: Optional description of this category.
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_modified:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - last_modified
      - name
      - slug
    CategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          description: Unique name of the category (e.g., Computing and IT).
          maxLength: 100
        description:
          type: string
          description: Optional description of this category.
      required:
      - name
    Certification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        certification_name:
          type: string
          description: Certification name
          maxLength: 200
        issuing_organization:
          type: string
          description: Issuing organization
          maxLength: 200
        issue_year:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Year obtained
        expiry_year:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
          description: Expiry year (if applicable)
        credential_id:
          type: string
          description: Credential ID
          maxLength: 100
        credential_url:
          type: string
          format: uri
          nullable: true
          description: Verification URL
          maxLength: 200
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - certification_name
      - created_at
      - id
      - issue_year
      - issuing_organization
      - updated_at
    CertificationRequest:
      type: object
      properties:
        certification_name:
          type: string
          minLength: 1
          description: Certification name
          maxLength: 200
        issuing_organization:
          type: string
          minLength: 1
          description: Issuing organization
          maxLength: 200
        issue_year:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Year obtained
        expiry_year:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
          description: Expiry year (if applicable)
        credential_id:
          type: string
          description: Credential ID
          maxLength: 100
        credential_url:
          type: string
          format: uri
          nullable: true
          description: Verification URL
          maxLength: 200
      required:
      - certification_name
      - issue_year
      - issuing_organization
    ChatAttachment:
