            * `ASSIGNED` - Assigned to Freelancer
            * `IN_PROGRESS` - In Progress - Work Being Done
            * `DELIVERED` - Delivered - Awaiting Client Review
            * `CLIENT_COMPLETED` - Client Completed - Payout Ready
            * `DISPUTE_OPEN` - Dispute Open
            * `DISPUTE_RESOLVED` - Dispute Resolved
            * `CANCELLED` - Cancelled
