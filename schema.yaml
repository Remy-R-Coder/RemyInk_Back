  /api/orders/payments/paystack/initialize/:
    post:
      operationId: api_orders_payments_paystack_initialize_create
      summary: Initialize Paystack payment for a job
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - job_id
              properties:
                job_id:
                  type: string
                  format: uuid
                session_key:
                  type: string
                  description: Optional if passed as query param.
                client_email:
                  type: string
                  format: email
                  description: Required for guest/shadow client jobs.
                client_password:
                  type: string
                  minLength: 8
                  description: Required for guest/shadow client jobs when no existing
                    client account matches client_email.
                client_password_confirm:
                  type: string
                  minLength: 8
                  description: Must match client_password.
            examples:
              GuestInitRequest:
                value:
                  job_id: 7ced640e-1d73-423c-90bf-37796f564db1
                  client_email: client@example.com
                  client_password: StrongPass123!
                  client_password_confirm: StrongPass123!
                summary: Guest init request
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorizationUrl:
                    type: string
                    format: uri
                  reference:
                    type: string
              examples:
                InitSuccess:
                  value:
                    authorizationUrl: https://checkout.paystack.com/abcd1234
                    reference: JOB-7ced640e-1d73-423c-90bf-37796f564db1-1772259985
                  summary: Init success
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  detail:
                    type: string
                  client_email:
                    type: string
                  client_password:
                    type: string
                  client_password_confirm:
                    type: string
              examples:
                MissingGuestPassword:
                  value:
                    client_password: This field is required.
                  summary: Missing guest password
                PasswordMismatch:
                  value:
                    client_password_confirm: Passwords do not match.
                  summary: Password mismatch
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                Auth/sessionMissing:
                  value:
                    error: Authentication required or session_key is required.
                  summary: Auth/session missing
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
